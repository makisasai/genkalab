const C = {
  bg:"#faf7f2", surface:"#ffffff", border:"#ede8e0",
  brown1:"#5c4a32", brown2:"#8a7560", brown3:"#b8a892",
  accent:"#c8873a", accentBg:"#fdf3e8",
  green:"#5a8a5a", greenBg:"#eef5ee",
  red:"#b85a5a", redBg:"#faeeed",
  yellow:"#c89a2a", yellowBg:"#fdf7e0",
  blue:"#4a7a9a", blueBg:"#edf4f8",
};

const fmt = (n, d=0) => {
  if (isNaN(n) || !isFinite(n)) return "—";
  return Number(n).toLocaleString("ja-JP", {minimumFractionDigits:d, maximumFractionDigits:d});
};
const pct = (n, d=1) => {
  if (isNaN(n) || !isFinite(n)) return "—";
  return Number(n).toFixed(d) + "%";
};

const NAV = [
  {id:"dashboard", label:"ダッシュボード", icon:"🏠"},
  {id:"master",    label:"食材マスタ",     icon:"🥦"},

  {id:"compare",   label:"商品比較",       icon:"⚖️"},
  {id:"reverse",   label:"逆算シミュ",     icon:"🔄"},
  {id:"plan",      label:"生産計画",       icon:"📅"},
  {id:"inventory", label:"棚卸し",         icon:"📦"},
  {id:"trend",     label:"推移レポート",   icon:"📈"},

const Card = ({children, style}) => (

// ダッシュボード
const PDATAS = [

// 食材マスタ
const CATS = ["野菜・果物","肉・魚","乳製品","調味料","穀物・粉類","その他"];
const UNIT_TO_G = {g:1, kg:1000, ml:1, L:1000};

function calcKgPrice(price, qty, unit, usableRate, gPerUnit) {
  const p = parseFloat(price)||0;
  const q = parseFloat(qty)||0;
  const r = (parseFloat(usableRate)||100)/100;
  let grams = unit==="個" ? q*(parseFloat(gPerUnit)||0) : q*(UNIT_TO_G[unit]||1);
  const usable = grams*r;
  if (usable<=0) return null;
  return {kgPrice:(p/usable)*1000, usableG:Math.round(usable), totalG:Math.round(grams)};
}

// 原価計算
function CostCalc() {
  const [price,    setPrice]    = React.useState(680);
  const [yieldR,   setYieldR]   = React.useState(94);
  const [mats,     setMats]     = React.useState([{id:1,name:"生クリーム",cost:120},{id:2,name:"牛乳",cost:45},{id:3,name:"砂糖",cost:20}]);
  const [lCost,    setLCost]    = React.useState(2000000);
  const [wMin,     setWMin]     = React.useState(12000);
  const [cMin,     setCMin]     = React.useState(3);

  const rawMat   = mats.reduce((s,m)=>s+(parseFloat(m.cost)||0),0);
  const yr       = Math.max(parseFloat(yieldR)||1,1)/100;
  const matCost  = rawMat/yr;
  const cpm      = wMin>0?lCost/wMin:0;
  const laborPU  = cpm*(parseFloat(cMin)||0);
  const total    = matCost+laborPU;
  const sp       = parseFloat(price)||0;
  const gp       = sp-total;
  const margin   = sp>0?(gp/sp)*100:0;
  const mType    = margin>=60?"good":margin>=40?"warn":"bad";
  const mColor   = mType==="good"?C.green:mType==="warn"?C.yellow:C.red;

  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>原価計算</h1>
      <Card>
        <Field label="販売価格" value={price} onChange={setPrice} unit="円"/>
      </Card>
      <Card>
        <div style={{fontSize:11,color:C.brown3,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>① 原材料費</div>
        {mats.map(m=>(
          <div key={m.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input type="text" value={m.name} onChange={e=>setMats(p=>p.map(x=>x.id===m.id?{...x,name:e.target.value}:x))}
              style={{flex:2,padding:"8px 10px",border:"1.5px solid "+C.border,borderRadius:8,fontSize:13,background:"#fdf9f5",outline:"none"}}/>

        {[
          {label:"原材料費（補正後）",val:fmt(matCost,1)+"円",color:"#f0e0c0"},

        <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0"}}>
          <span style={{fontSize:14,color:"#d8c8a0",fontWeight:700}}>粗利</span>

// 商品比較
function Compare() {
  const sorted = [...PDATAS].sort((a,b)=>(b.price-b.mat-b.labor)*b.units-(a.price-a.mat-a.labor)*a.units);
  const maxGP = (sorted[0].price-sorted[0].mat-sorted[0].labor)*sorted[0].units;
  const colors = [C.accent,C.blue,C.green,"#9a6ac0"];
  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>商品比較</h1>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:C.brown1,marginBottom:14}}>商品別 粗利額ランキング</div>
        {sorted.map((p,i)=>{
          const gp=(p.price-p.mat-p.labor)*p.units;
          const margin=(p.price-p.mat-p.labor)/p.price*100;
          return (
            <div key={i} style={{marginBottom:16,padding:14,background:C.bg,borderRadius:12,border:"1px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:C.brown1}}>
                    <span style={{color:colors[i],fontWeight:900,marginRight:6}}>#{i+1}</span>{p.name}
                  </div>
                  <div style={{fontSize:11,color:C.brown3,marginTop:2}}>{fmt(p.units)}個 × ¥{p.price} / 粗利率 {pct(margin)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:900,color:C.brown1}}>¥{fmt(gp)}</div>
                  <div style={{fontSize:11,color:C.brown3}}>月間粗利額</div>
                </div>
              </div>
              <div style={{height:6,background:"#f0ece4",borderRadius:99}}>
                <div style={{height:"100%",width:(gp/maxGP*100)+"%",background:colors[i],borderRadius:99}}/>
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// 逆算シミュ
function Reverse() {
  const [matCost, setMatCost] = React.useState(233);
  const [target,  setTarget]  = React.useState(60);
  const needed = target<100 ? matCost/(1-target/100) : null;
  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>逆算シミュレーター</h1>
      <Card>
        <Field label="製造原価合計（1個）" value={matCost} onChange={setMatCost} unit="円"/>
      </Card>
      <Card>
        <Field label="目標粗利率" value={target} onChange={setTarget} unit="%"/>
        {needed && (
          <div style={{padding:16,background:C.accentBg,borderRadius:12,border:"1px solid "+C.accent+"30",marginTop:8}}>
            <div style={{fontSize:12,color:C.brown2,marginBottom:8}}>粗利率 {target}% を達成するには</div>
            <div style={{fontSize:28,fontWeight:900,color:C.accent}}>¥{fmt(needed,0)}<span style={{fontSize:14,fontWeight:400,marginLeft:4}}>円以上</span></div>
          </div>
        )}
      </Card>
      <Card>
        <div style={{fontSize:11,color:C.brown3,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>損益分岐点</div>
        <div style={{padding:14,background:C.bg,borderRadius:10}}>
          <div style={{fontSize:12,color:C.brown2,marginBottom:8}}>最低でもこの価格で売らないと赤字</div>
          <div style={{fontSize:28,fontWeight:900,color:C.red}}>¥{fmt(matCost,0)}<span style={{fontSize:14,fontWeight:400,marginLeft:4}}>円</span></div>
        </div>
      </Card>
    </div>
  );
}

// 生産計画
function Plan() {
  const [units, setUnits] = React.useState(500);
  const [days,  setDays]  = React.useState(20);
  const p = PDATAS[0];
  const rev    = (parseFloat(units)||0)*p.price;
  const cost   = (parseFloat(units)||0)*(p.mat+p.labor);
  const profit = rev-cost;
  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>生産計画</h1>
      <Card>
        <Field label="月間製造数" value={units} onChange={setUnits} unit="個"/>
        <Field label="月間稼働日数" value={days} onChange={setDays} unit="日"/>
        <div style={{padding:"10px 12px",background:C.bg,borderRadius:8,display:"flex",justifyContent:"space-between",fontSize:13}}>
          <span style={{color:C.brown2}}>1日あたり</span>
          <span style={{fontWeight:700,color:C.brown1}}>{fmt((parseFloat(units)||0)/(parseFloat(days)||1),1)}個</span>
        </div>
      </Card>
      <div style={{background:C.brown1,borderRadius:14,padding:20,color:"#fff"}}>
        <div style={{fontSize:10,letterSpacing:"0.15em",color:"#a09080",textTransform:"uppercase",marginBottom:16}}>月間損益 — {units}個</div>
        {[
          {label:"月間売上",val:"¥"+fmt(rev),   color:"#f0e8d0"},
          {label:"製造原価",val:"-¥"+fmt(cost), color:"#e8b870"},
        ].map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #3a3020"}}>
            <span style={{fontSize:12,color:"#b0a080"}}>{r.label}</span>
            <span style={{fontSize:14,fontWeight:700,color:r.color}}>{r.val}</span>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"14px 0 0"}}>
          <span style={{fontSize:14,color:"#d8c8a0",fontWeight:700}}>月間粗利</span>
          <span style={{fontSize:24,fontWeight:900,color:profit>=0?"#90d4a8":"#e87a7a"}}>¥{fmt(profit)}</span>
        </div>
      </div>
    </div>
  );
}

// 棚卸し
function Inventory() {
  const items = [
    {name:"生クリーム",prev:2000,pur:15000,close:1800,unit:"ml",cost:0.24},
    {name:"牛乳",      prev:5000,pur:40000,close:4200,unit:"ml",cost:0.09},
    {name:"卵",        prev:120, pur:800,  close:95,  unit:"個",cost:28},
  ];
  const totalLoss = items.reduce((s,it)=>{
    const actual=it.prev+it.pur-it.close;
    const loss=Math.max(actual-actual*0.92,0);
    return s+loss*it.cost;
  },0);
  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>棚卸し・ロス管理</h1>
      <div style={{background:C.brown1,borderRadius:14,padding:16,marginBottom:14,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:"#8a7a5a",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:4}}>月間ロス金額</div>
          <div style={{fontSize:24,fontWeight:900,color:"#e87a7a"}}>¥{fmt(totalLoss,0)}</div>
        </div>
        <span style={{fontSize:30}}>📦</span>
      </div>
      {items.map((it,i)=>{
        const actual=it.prev+it.pur-it.close;
        const loss=actual-actual*0.92;
        const lossRate=(loss/actual)*100;
        return (
          <Card key={i}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:14,fontWeight:700,color:C.brown1}}>{it.name}</div>
              <span style={{fontSize:12,padding:"2px 8px",borderRadius:99,
                background:lossRate>5?C.redBg:C.greenBg,color:lossRate>5?C.red:C.green,fontWeight:700}}>
                ロス率 {pct(lossRate)}
              </span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                {label:"実際使用量",val:fmt(actual,0)+it.unit},
                {label:"ロス量",    val:fmt(loss,1)+it.unit},
                {label:"ロス金額",  val:"¥"+fmt(loss*it.cost,0)},
              ].map((r,j)=>(
                <div key={j} style={{padding:8,background:C.bg,borderRadius:8,textAlign:"center"}}>
                  <div style={{fontSize:10,color:C.brown3,marginBottom:3}}>{r.label}</div>
                  <div style={{fontSize:13,fontWeight:700,color:C.brown1}}>{r.val}</div>
                </div>
              ))}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// 推移レポート

];

    <div>
      <h1 style={{fontSize:20,fontWeight:900,color:C.brown1,marginBottom:16}}>推移レポート</h1>

        <div style={{fontSize:13,fontWeight:700,color:C.brown1,marginBottom:16}}>月次売上・粗利推移</div>
        {MONTHLY.map((m,i)=>(
          <div key={i} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}>

              <div style={{display:"flex",gap:12}}>

              </div>
            </div>
            <div style={{position:"relative",height:10,background:"#f0ece4",borderRadius:99,overflow:"hidden"}}>
              <div style={{position:"absolute",height:"100%",width:(m.rev/maxRev*100)+"%",background:C.blue,borderRadius:99,opacity:0.4}}/>
              <div style={{position:"absolute",height:"100%",width:(m.profit/maxRev*100)+"%",background:C.green,borderRadius:99}}/>
            </div>
          </div>
        ))}
      </Card>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:C.brown1,marginBottom:14}}>前年同月比</div>
        {[
          {label:"売上高",   val:"+8.2%",  good:true},
          {label:"粗利額",   val:"+12.4%", good:true},
          {label:"営業利益", val:"+5.1%",  good:true},
          {label:"製造原価", val:"+3.2%",  good:false},
        ].map((r,i)=>(

            <span style={{padding:"2px 10px",borderRadius:99,background:r.good?C.greenBg:C.yellowBg,color:r.good?C.green:C.yellow,fontWeight:700,fontSize:11}}>{r.val}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

// メインアプリ
function App() {
  const [screen,   setScreen]   = React.useState("dashboard");

  const nav = (id) => { setScreen(id); setMenuOpen(false); };

  const screens = {
    dashboard: <Dashboard/>,
    master:    <MasterScreen/>,
    calc:      <CostCalc/>,
    compare:   <Compare/>,
    reverse:   <Reverse/>,
    plan:      <Plan/>,
    inventory: <Inventory/>,
    trend:     <Trend/>,
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{background:"#fff",borderBottom:"1px solid "+C.border,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:9,letterSpacing:"0.2em",color:C.brown3,textTransform:"uppercase"}}>Food Manufacturing</div>
          <div style={{fontSize:18,fontWeight:900,color:C.accent}}>GenkaLab</div>
        </div>
        <button onClick={()=>setMenuOpen(!menuOpen)}
          style={{border:"1px solid "+C.border,background:"#fff",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,color:C.brown2,fontWeight:600}}>
          {menuOpen?"✕":"☰ メニュー"}
        </button>
      </div>

      {menuOpen && (
        <div style={{background:"#fff",borderBottom:"1px solid "+C.border,padding:"8px 12px",zIndex:99}}>
          {NAV.map(n=>(
            <div key={n.id} onClick={()=>nav(n.id)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:10,marginBottom:3,cursor:"pointer",

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
